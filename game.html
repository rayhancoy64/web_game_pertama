<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Game - SAMPELGAME</title>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

    <link rel="stylesheet" href="style.css">

    <!-- css untuk kolom pencarian -->
     <style>
        .search-container{
            /* menggunakan flexbox */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 20px 0 20px;
            margin: 0 10px;
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 500px;
            background-color: var(--warnakartu);
            border: 2px solid var(--birutua);
            border-radius: 30px;
        }
        .search-input {
            flex: 1;
            width: 100%;
            padding: 10px 15px;
            border: none;
            outline: none;
            font-size: 15px;
            background-color: transparent;
            color: var(--putih);
        }

        .search-input::placeholder{
            color: #aaa;
        }

        .search-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 20px;    
            flex-shrink: 0;
            border-radius: 25px;
            border: none;
            background-color: var(--birumuda);
            color: var(--birutua);
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .search-btn:hover{
            background-color: var(--putih);
            color: var(--birutua);

        }

        .search-btn:active{
            background-color: var(--birumuda);
            color: var(--birutua);
            transform: scale(0.92);
        }
     </style>
</head>
<body>
    <!-- header logo dan nama web -->
    <header class="header-web">
        <div class="logo-container">
            <img src="aset-web/logo_sampelgame.png" alt="logo" class="logo-img">
            <h1 class="nama-web"><span class="teks-biru">SAMPEL</span>GAME</h1>
        </div>
    </header>
    <!-- navbar menu -->
        <nav class="menu">
            <a href="index.html">Beranda</a>
            <a href="game.html" class="active">Game</a>
            <a href="kategori.html">Kategori</a>
            <a href="profil.html" >Profil</a>
        </nav>
    
    <!-- kolom Pencarian -->
     <section class="search-container">
        <div class="search-wrapper">
            <input type="text" id="input-cari" class="search-input" placeholder="Cari Game...">
            <button class="search-btn" title="Cari">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
     </section>

     <!-- katalog game lengkap -->
    <section>
        <h3 class="section-title">Semua Game</h3>
        <div class="scroll-atasbawah" id="daftar-game">

        </div>
    </section>
    

<!-- script meload semua data game dari file data.js -->
     <script src="data.js"></script>

     <script>
        // 1. tangkap elemen HTML
        const wadahgame = document.getElementById('daftar-game');
        const inputcari = document.getElementById('input-cari');
        
        // ubah judul menjadi kategori
        const judulkatalog = document.querySelector('.section-title');

        // tangkap elemen tombol cari
        const tombolcari = document.querySelector('.search-btn');

        const urlparams = new URLSearchParams(window.location.search);
        const filterkategori = urlparams.get('kategori');

        let datatampil = databasegame;

        if (filterkategori) {
            datatampil = databasegame.filter(game => game.kategori === filterkategori);

            if (judulkatalog){
                judulkatalog.innerText = filterkategori.toUpperCase();
            }
        }


        // fungsi khusus untuk mencetak game ke layar
        function tampikangame(data) {
            wadahgame.innerHTML = '';

            // jika pencarian tidak ditemukan
            if (data.length === 0) {
                wadahgame.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 60px 20px; background-color: var(--warnakartu); border-radius: 8px; border: 1px dashed var(--langit);">
                        <i class="fa-solid fa-gamepad" style="font-size: 60px; color: var(--langit); margin-bottom: 15px;"></i>
                        <h4 style="color: var(--putih); margin: 0; font-size: 22px; font-family: 'Orbitron', sans-serif;">Oops! Game Tidak Ditemukan</h4>
                        <p style="color: var(--langit); font-size: 14px; margin-top: 10px;">Coba gunakan kata kunci lain untuk mencari game yang kamu inginkan.</p>
                    </div>
                `;
                return; //berhenti di sini
            }

            data.forEach(game =>{
                let badgehtml = '';
                if (game.status === "belum_rilis"){
                    badgehtml = `<div class="badge-status"><i class="fa-solid fa-clock"></i> SOON</div>`;
                }else{
                    badgehtml = `<div class="badge-status"><i class="fa-solid fa-play"></i> PLAY</div>`;
                }
                    wadahgame.innerHTML += `
                        <a href="halaman-main.html?id=${game.id}" style="text-decoration: none;">
                            <div class="game-card" >
                                    <img src="${game.gambar}" alt="${game.judul}" class="game-image">
                                    <h5 class="game-title">${game.judul}</h5>
                                    ${badgehtml}
                            </div>
                        </a>
                    `;
                });        
        }

        // saat dibuka pertama kali, tampilkan semua game
        tampikangame(datatampil);

        // fitur pencarian, akan dijalakan otomatis jika kolom pencarian di isi teks
        function jalankanpecarian() {
            // ambil input dan ubah jadi huruf kecil
            const katakunci = inputcari.value.toLowerCase();

            // saring database. cari judul yang mengandung katakunci
            const hasilpencarian = datatampil.filter(game => {
                return game.judul.toLowerCase().includes(katakunci);
            });

            // tampilkan hasil pencarian
            tampikangame(hasilpencarian);
        }

        // jalankan pencarian saat tombol "cari" diklik
        tombolcari.addEventListener('click', jalankanpecarian);

        // jalakan pencarian saat tombol "enter" ditekan di keyboard/hp
        inputcari.addEventListener('keypress', function(event){
            if (event.key === 'Enter') {
                jalankanpecarian();
            }
        });
     </script>
</body>
</html>
