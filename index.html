<html>
<head>
    <title>SIMPELGAME</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header-web">
        <div>
            <h1>SIMPELGAME</h1>
        </div>


    </header>

        <nav class="menu">
            <a href="#" class="active">Beranda</a>
            <a href="#" >Game</a>
            <a href="#" >Profil</a>
        </nav>

    <section>
        <h3 class="section-title">Rekomendasi Game</h3>

        <div class="scroll-samping">
            <div class="promo-card ">
                <img src="gambar game/16re2.jpg" alt="elden ring" class="promo-image">
                <h3 class="promo-title">re 2</h3>   
            </div>
            <div class="promo-card ">
                <img src="gambar game/16re4.jpg" alt="elden ring" class="promo-image">
                <h3 class="promo-title">re 4</h3>
            </div>
            <div class="promo-card ">
                <img src="gambar game/16re9.jpg" alt="elden ring" class="promo-image">
                <h3 class="promo-title">re 9</h3>
            </div>
            <div class="promo-card ">
                <img src="gambar game/16spiderman.jpg" alt="elden ring" class="promo-image">
                <h3 class="promo-title">spiderman</h3>
            </div>
        </div>
    </section>
    

    <section class="main-content">
        <h3 class="section-title">Pilihan Game</h3>

        <div class="scroll-atasbawah">
            <div class="game-card">
                <img src="gambar game/elden-ring.jpg" alt="elden ring" class="game-image">
                <h3 class="game-title">elden ring</h3>
            </div>

            <div class="game-card">
                <img src="gambar game/dark-souls.jpg" alt="elden ring" class="game-image">
                <h3 class="game-title">dark-souls</h3>
            </div>

            <div class="game-card">
                <img src="gambar game/dark-souls2.jpg" alt="elden ring" class="game-image">
                <h3 class="game-title">dark-souls2</h3>
            </div>

            <div class="game-card">
                <img src="gambar game/dark-souls3.jpg" alt="elden ring" class="game-image">
                <h3 class="game-title">dark-souls3</h3>
            </div>

            <div class="game-card">
                <img src="gambar game/ghost-of-tsushima.jpg" alt="elden ring" class="game-image">
                <h3 class="game-title">ghost-of-tsushima</h3>
            </div>

            <div class="game-card">
                <img src="gambar game/re_village.jpg" alt="elden ring" class="game-image">
                <h3 class="game-title">re_village</h3>
            </div>
        </div>
    </section>

</body>

</html>
