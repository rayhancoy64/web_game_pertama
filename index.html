<html>
<head>
    <title>SIMPELGAME</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header-web">
        <div>
            <h1>SIMPELGAME</h1>
        </div>
    </header>

        <nav class="menu">
            <a href="index.html" class="active">Beranda</a>
            <a href="game.html" >Game</a>
            <a href="kategori.html">Kategori</a>
            <a href="profil.html" >Profil</a>
        </nav>

    <section>
        <h3 class="section-title">Rekomendasi Game</h3>
        <div class="scroll-samping" id="rekomendasi-container">

        </div>
    </section>
    

    <section class="main-content">
        <h3 class="section-title">Pilihan Game</h3>
        <div class="scroll-atasbawah" id="pilihan-container">

        </div>
    </section>

<!-- script meload semua data game dari file data.js -->
     <script src="data.js"></script>

     <script>
        // 1. tangkap elemen HTML
        const wadahrekomendasi = document.getElementById('rekomendasi-container');
        const wadahpilihan = document.getElementById('pilihan-container');

        // 2. ambil 3 game pertama dari database untuk rekomendasi game
        const gamerekomendasi = databasegame.slice(0, 5)

        gamerekomendasi.forEach(game => {
            wadahrekomendasi.innerHTML += `
                <div class="promo-card" >
                    <a href="halaman-main.html?id=${game.id}" style="text-decoration: none;">
                        <img src="${game.gambar}" alt="${game.judul}" class="promo-image">
                        <h3 class="promo-title">${game.judul}</h3>
                    </a>
                </div>
            `;  
        });

        databasegame.forEach(game =>{
            wadahpilihan.innerHTML += `
                <a href="halaman-main.html?id=${game.id}" style="text-decoration: none;">
                    <div class="game-card" >
                            <img src="${game.gambar}" alt="${game.judul}" class="game-image">
                            <h3 class="game-title">${game.judul}</h3>
                    </div>
                </a>
            `;
        });

     </script>

</body>

</html>
